<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agenda Medica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold">Agenda Medica</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm text-blue-200">{{ user_email }}</span>
                <a href="{{ url_for('auth.logout') }}"
                    class="bg-blue-600 hover:bg-blue-800 px-3 py-1 rounded text-sm transition duration-200">
                    Sair
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white rounded-lg shadow-md p-6">

            {% if error_message %}
            <div id="error-state" class="text-center py-12">
                <svg class="mx-auto h-12 w-12 text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                </svg>
                <p class="text-lg font-medium text-red-700">{{ error_message }}</p>
                <p class="text-sm text-red-500 mt-1">Verifique a conexao e tente novamente.</p>
                <button onclick="location.reload()"
                    class="mt-4 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Tentar novamente
                </button>
            </div>
            {% else %}

            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
                <h2 class="text-lg font-semibold text-gray-800">Agendamentos</h2>
                <div class="relative">
                    <input type="text" id="search-input"
                        placeholder="Buscar por paciente, CPF ou medico..."
                        class="w-full sm:w-80 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                </div>
            </div>

            <div id="table-wrapper">
                <div id="agendamentos-table"></div>
            </div>

            <div id="empty-state" class="hidden text-center py-12 text-gray-500">
                <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p class="text-lg font-medium">Nenhum agendamento encontrado</p>
                <p class="text-sm">Nao ha registros para exibir no momento.</p>
            </div>

            {% endif %}
        </div>
    </main>

    <script>
        var AGENDAMENTOS_DATA = {{ agendamentos_json|safe }};
    </script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}?v=2"></script>
</body>
</html>
